name: Build BoxClaw Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 获取最新代码
      uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装核心依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyinstaller-hooks-contrib
        pip install -r requirements.txt

    - name: 使用 PyInstaller 打包 EXE (静默完美版)
      shell: bash
      run: |
        # 加上 --windowed 隐藏黑框，利用 Python 里的 io.StringIO 兜底日志
        pyinstaller --noconfirm --onedir --windowed --name "BoxClaw" \
          --hidden-import=PySide6.QtWebEngineCore \
          --hidden-import=PySide6.QtWebEngineWidgets \
          --hidden-import=flask \
          --collect-all=qfluentwidgets \
          --collect-all=PySide6 \
          boxclaw_main.py

    - name: 上传成品供下载
      uses: actions/upload-artifact@v4
      with:
        name: BoxClaw-Windows-Ready
        path: dist/BoxClaw/
